# This file contains default values, and does not need to be edited. All
# important settings can be changed from the admin interface.

defaults: &defaults
  site_title: Mastodon
  site_short_description: ''
  site_description: ''
  site_extended_description: ''
  site_terms: ''
  site_contact_username: ''
  site_contact_email: ''
  registrations_mode: 'approved'
  profile_directory: true
  closed_registrations_message: ''
  local_live_feed_access: 'authenticated'
  remote_live_feed_access: 'authenticated'
  local_topic_feed_access: 'authenticated'
  remote_topic_feed_access: 'authenticated'
  show_staff_badge: true
  preview_sensitive_media: false
  noindex: true
  theme: 'custom-theme'
  trends: false
  thumbnail_description: ''
  trendable_by_default: false
  disallowed_hashtags: # space separated string or list of hashtags without the hash
  bootstrap_timeline_accounts: ''
  activity_api_enabled: false
  peers_api_enabled: false
  show_domain_blocks: 'disabled'
  show_domain_blocks_rationale: 'disabled'
  require_invite_text: false
  backups_retention_period: 7
  captcha_enabled: false
  allow_referrer_origin: false
  landing_page: 'about'
  wrapstodon: true

  # --- Chamomile Edition Settings ---
  chamomile_dice_enabled: false
  chamomile_markdown_enabled: false
  chamomile_boards: []
  status_length_limit: 500

development:
  <<: *defaults

test:
  <<: *defaults

production:
  <<: *defaults