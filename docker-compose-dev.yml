services:
  db:
    restart: always
    image: postgres:14-alpine
    shm_size: 256mb
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'mastodon', '-d', 'mastodon_production']
    volumes:
      - ./postgres14:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mastodon
      - POSTGRES_PASSWORD=mastodon
      - POSTGRES_DB=mastodon_production # 개발 모드에서도 일단 이 이름을 쓰거나, .env에 맞춰 수정하세요.
      - POSTGRES_HOST_AUTH_METHOD=trust

  redis:
    restart: always
    image: redis:7-alpine
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    volumes:
      - ./redis:/data

  es:
    profiles: ["search"]
    restart: always
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.14
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "cluster.name=es-mastodon"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
      - "xpack.security.enabled=false"
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # 개발 모드용 통합 WEB 서비스
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    # .env.production 대신 아까 만든 .env 파일을 바라보게 합니다.
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
    ports:
      - '3000:3000'
      - '3036:3036' # Vite 개발 서버용
    volumes:
      - .:/opt/mastodon # [핵심] 소스 코드 실시간 동기화
      - ./public/system:/opt/mastodon/public/system
    networks:
      - external_network
      - internal_network
    depends_on:
      - db
      - redis
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/dev"
    healthcheck:
      test: ['CMD-SHELL', "curl -s --noproxy localhost localhost:3000/health | grep -q 'OK' || exit 1"]

  streaming:
    build:
      context: .
      dockerfile: Dockerfile.dev # 빌드 시간 단축을 위해 개발용 파일 공유
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/opt/mastodon
    networks:
      - external_network
      - internal_network
    command: node ./streaming/index.js
    depends_on:
      - db
      - redis

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.dev # 빌드 시간 단축을 위해 개발용 파일 공유
    restart: always
    env_file: .env
    environment:
      - RAILS_ENV=development
    volumes:
      - .:/opt/mastodon
      - ./public/system:/opt/mastodon/public/system
    networks:
      - external_network
      - internal_network
    command: bundle exec sidekiq
    depends_on:
      - db
      - redis

networks:
  external_network:
  internal_network:
    internal: true