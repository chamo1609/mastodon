name: Build and Push Chamomile Edition

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------
      # 1. Main Image (Web / Sidekiq) 빌드 및 푸시
      # ---------------------------------------------------
      - name: Docker meta for Main Image
        id: meta-main
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Main Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-main.outputs.tags }}
          labels: ${{ steps.meta-main.outputs.labels }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

      # ---------------------------------------------------
      # 2. Streaming Image 빌드 및 푸시
      # ---------------------------------------------------
      - name: Docker meta for Streaming Image
        id: meta-streaming
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-streaming
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Streaming Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./streaming/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-streaming.outputs.tags }}
          labels: ${{ steps.meta-streaming.outputs.labels }}
          cache-from: type=gha,scope=streaming
          cache-to: type=gha,mode=max,scope=streaming